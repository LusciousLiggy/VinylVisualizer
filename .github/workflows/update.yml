name: Update Vinyl Dashboard

on:
  schedule:
    - cron: '0 14 * * *'   # 2 PM UTC = 9 AM EST / 10 AM EDT daily
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate dashboard
        env:
          DISCOGS_TOKEN: ${{ secrets.DISCOGS_TOKEN }}
        run: python fetch_collection.py --silent

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add collection_dashboard.html price_cache.json release_cache.json
          git diff --staged --quiet || git commit -m "chore: update dashboard $(date -u +'%Y-%m-%d')"
          git push
